<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Miguel Angel Huamanvilca Caqui</title>
    <style>
        :root {
            --primary-color: #003366;
            --secondary-color: #f4f7f9;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--secondary-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .vcard-container {
            background: #fff;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
        }
        .header {
            background: var(--primary-color);
            color: white;
            padding: 30px 20px;
        }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 0.9rem; }
        
        .content { padding: 25px; }
        
        .action-buttons {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-call { background: #25D366; color: white; } /* Color WhatsApp */
        .btn-mail { background: #ea4335; color: white; } /* Color Gmail */
        .btn-web { background: #0077b5; color: white; } /* Color LinkedIn */

        .location-tag {
            display: block;
            margin-bottom: 20px;
            color: #777;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="vcard-container">
        <div class="header">
            <h1>Miguel Angel Huamanvilca Caqui</h1>
            <p>Técnico en Computación e Informática</p>
        </div>
        <div class="content">
            <span class="location-tag">📍 Huánuco, Perú</span>
            
            <div class="action-buttons">
                <a href="https://wa.me/51918544025" class="btn btn-call">WhatsApp</a>
                
                <a href="mailto:itsmiguelhuamanvilca@gmail.com" class="btn btn-mail">Enviar Correo</a>
                
                <a href="https://itsmiguelhuamanvilca.github.io" class="btn btn-web">Ver Portafolio (GitHub)</a>
            </div>
        </div>
        <div style="padding: 15px; font-size: 0.7rem; color: #bbb;">
            &copy; 2026 - Perfil Profesional Protegido
        </div>
    </div>
</body>
</html>
