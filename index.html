<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miguel Angel | Perfil Tecnológico</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-main: #c9d1d9;
            --text-bright: #ffffff;
            --border-color: #30363d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .vcard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .profile-header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            color: var(--text-bright);
            margin: 0;
            letter-spacing: -1px;
        }

        .profile-header p {
            color: var(--accent-color);
            font-size: 0.9rem;
            margin: 10px 0 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-list {
            text-align: left;
            margin-bottom: 30px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .info-item span {
            font-size: 0.9rem;
            margin-left: 12px;
        }

        .btn-container {
            display: grid;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: block;
        }

        .btn-github {
            background-color: #238636;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-github:hover {
            background-color: #2ea043;
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .btn-outline:hover {
            background-color: rgba(88, 166, 255, 0.1);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #8b949e;
        }

        /* Simulación de Iconos con CSS para no depender de librerías externas */
        .icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            background: var(--accent-color);
            mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
        }
    </style>
</head>
<body>

    <div class="vcard">
        <div class="profile-header">
            <h1>MIGUEL ANGEL HUAMANVILCA</h1>
            <p>Técnico en Computación e Informática</p>
        </div>

        <div class="info-list">
            <div class="info-item">
                <div style="color: var(--accent-color)">📍</div>
                <span>Huánuco, Perú</span>
            </div>
            <div class="info-item">
                <div style="color: var(--accent-color)">📧</div>
                <span>itsmiguelhuamanvilca@gmail.com</span>
            </div>
            <div class="info-item">
                <div style="color: var(--accent-color)">📱</div>
                <span>+51 918 544 025</span>
            </div>
        </div>

        <div class="btn-container">
            <a href="https://github.com/itsmiguelhuamanvilca-dotcom" class="btn btn-github">VER PORTAFOLIO EN GITHUB</a>
            <a href="https://wa.me/51918544025" class="btn btn-outline">CONTACTAR POR WHATSAPP</a>
            <a href="mailto:itsmiguelhuamanvilca@gmail.com" class="btn btn-outline">ENVIAR CORREO</a>
        </div>

        <div class="footer">
            💻 Perfil Profesional Protegido | 2026
        </div>
    </div>

</body>
</html>
